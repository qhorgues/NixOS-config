name: Update Flake Lock

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  update-flake:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update flake.lock
        run: |
          nix flake update

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet flake.lock; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create update branch
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          BRANCH_NAME="flake-update-$(date +%Y%m%d-%H%M%S)"
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV
          git checkout -b "$BRANCH_NAME"
          git add flake.lock
          git commit -m "chore: update flake.lock"
          git push origin "$BRANCH_NAME"

      - name: Create or verify labels
        if: steps.check_changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create "dependencies" --description "Pull requests that update a dependency file" --color "0366d6" || true
          gh label create "automated" --description "Automated pull requests" --color "34d058" || true

      - name: Create Pull Request
        if: steps.check_changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr create \
            --title "Automatic flake.lock update" \
            --body "This PR automatically updates flake.lock.

          **Auto-merge scheduled in 3 days**

          This PR will be automatically merged after a 3-day review period.

          Review the changes and close this PR if you don't want to apply this update." \
            --base master \
            --head "$BRANCH_NAME" \
            --label "dependencies,automated"

      - name: Close outdated flake-update PRs
        if: steps.check_changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Ferme toutes les PRs flake-update ouvertes sauf celle qu'on vient de créer
          gh pr list \
            --state open \
            --label "automated" \
            --json number,headRefName,title,author \
            --jq "
              .[]
              | select(.headRefName | startswith(\"flake-update-\"))
              | select(.headRefName != \"$BRANCH_NAME\")
              | select(.title | startswith(\"Automatic flake.lock update\"))
              | select(.author.login == \"app/github-actions\")
              | .number
            " | while read -r OLD_PR; do
              echo "Closing outdated PR #$OLD_PR (superseded by new flake.lock update)"
              gh pr close "$OLD_PR" \
                --comment "Superseded by a newer flake.lock update PR. Closing automatically." \
                --delete-branch
            done

  auto-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Find oldest PR to merge (> 3 days) and close the rest
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          CUTOFF_DATE=$(date -u -d '72 hours ago' +%Y-%m-%dT%H:%M:%SZ)

          # Récupère tous les PRs éligibles triés du plus ancien au plus récent
          ELIGIBLE_PRS=$(gh pr list \
            --state open \
            --label "automated" \
            --json number,createdAt,headRefName,title,author \
            --jq "
              [ .[]
                | select(.createdAt < \"$CUTOFF_DATE\")
                | select(.headRefName | startswith(\"flake-update-\"))
                | select(.title | startswith(\"Automatic flake.lock update\"))
                | select(.author.login == \"app/github-actions\")
              ]
              | sort_by(.createdAt)
              | .[].number
            ")

          if [ -z "$ELIGIBLE_PRS" ]; then
            echo "No eligible PR found."
            exit 0
          fi

          # Le premier est le plus ancien : on le merge
          PR_NUMBER=$(echo "$ELIGIBLE_PRS" | head -n1)
          # Les suivants sont obsolètes : on les ferme
          OUTDATED_PRS=$(echo "$ELIGIBLE_PRS" | tail -n +2)

          echo "Processing PR #$PR_NUMBER (oldest flake.lock update older than 3 days)"

          CHANGED_FILES=$(gh pr view "$PR_NUMBER" --json files --jq '.files[].path')
          if ! echo "$CHANGED_FILES" | grep -q "^flake.lock$"; then
            echo "⚠️  PR #$PR_NUMBER has unexpected file changes, skipping for safety"
            echo "Changed files: $CHANGED_FILES"
            exit 1
          fi

          BRANCH_NAME=$(gh pr view "$PR_NUMBER" --json headRefName --jq '.headRefName')

          git fetch origin
          git checkout origin/master
          git checkout "origin/$BRANCH_NAME" -- flake.lock
          git commit -m "chore: update flake.lock [automated]"
          git push origin HEAD:master

          gh pr close "$PR_NUMBER" \
            --comment "Merged manually via force-overwrite." \
            --delete-branch

          # Ferme les PRs éligibles plus récentes qui sont désormais obsolètes
          if [ -n "$OUTDATED_PRS" ]; then
            echo "$OUTDATED_PRS" | while read -r OLD_PR; do
              echo "Closing outdated PR #$OLD_PR (superseded by merged PR #$PR_NUMBER)"
              gh pr close "$OLD_PR" \
                --comment "Superseded by merged PR #$PR_NUMBER. Closing automatically." \
                --delete-branch
            done
          fi
